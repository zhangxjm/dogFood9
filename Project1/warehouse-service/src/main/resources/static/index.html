<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保税仓库管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;display:flex;min-height:100vh;background:#f5f6fa;color:#333}
.sidebar{width:240px;background:#1a2332;color:#fff;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100}
.sidebar .logo{padding:20px;font-size:20px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.sidebar .logo span{color:#4a90d9}
.sidebar nav{padding:10px 0}
.sidebar nav a{display:flex;align-items:center;padding:12px 20px;color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;transition:all .2s;cursor:pointer}
.sidebar nav a:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar nav a.active{background:rgba(74,144,217,.2);color:#4a90d9;border-right:3px solid #4a90d9}
.sidebar nav a .icon{margin-right:10px;font-size:16px;width:20px;text-align:center}
.main{margin-left:240px;flex:1;padding:24px;min-height:100vh}
.page{display:none}
.page.active{display:block}
.page h2{font-size:22px;margin-bottom:20px;color:#1a2332;font-weight:600}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-card .label{font-size:13px;color:#999;margin-bottom:8px}
.stat-card .value{font-size:28px;font-weight:700;color:#1a2332}
.stat-card .value.blue{color:#4a90d9}
.stat-card .value.orange{color:#e6a23c}
.stat-card .value.red{color:#f56c6c}
.stat-card .value.green{color:#67c23a}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:20px;margin-bottom:20px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-header h3{font-size:16px;color:#1a2332}
.btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.btn-primary{background:#4a90d9;color:#fff}
.btn-primary:hover{background:#3a7bc8}
.btn-success{background:#67c23a;color:#fff}
.btn-success:hover{background:#5daf34}
.btn-warning{background:#e6a23c;color:#fff}
.btn-warning:hover{background:#cf9236}
.btn-danger{background:#f56c6c;color:#fff}
.btn-danger:hover{background:#e05555}
.btn-info{background:#909399;color:#fff}
.btn-info:hover{background:#7a7d82}
.btn-sm{padding:5px 10px;font-size:12px}
table{width:100%;border-collapse:collapse}
table th{background:#f0f2f5;padding:10px 12px;text-align:left;font-size:13px;color:#666;font-weight:600;white-space:nowrap}
table td{padding:10px 12px;border-bottom:1px solid #f0f2f5;font-size:13px;white-space:nowrap}
table tr:nth-child(even){background:#fafbfc}
table tr:hover{background:#f0f5ff}
.badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:12px;font-weight:500}
.badge-green{background:#f0f9eb;color:#67c23a}
.badge-blue{background:#ecf5ff;color:#4a90d9}
.badge-red{background:#fef0f0;color:#f56c6c}
.badge-orange{background:#fdf6ec;color:#e6a23c}
.badge-gray{background:#f4f4f5;color:#909399}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:none;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:8px;width:600px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.modal-header{padding:16px 20px;border-bottom:1px solid #f0f2f5;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:0}
.modal-close:hover{color:#333}
.modal-body{padding:20px}
.modal-footer{padding:16px 20px;border-top:1px solid #f0f2f5;text-align:right;display:flex;gap:8px;justify-content:flex-end}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:#666;margin-bottom:5px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #dcdfe6;border-radius:4px;font-size:13px;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#4a90d9}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.table-wrap{overflow-x:auto}
.actions{display:flex;gap:4px}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1100;display:none;justify-content:center;align-items:center}
.confirm-overlay.active{display:flex}
.confirm-box{background:#fff;border-radius:8px;padding:24px;width:400px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.confirm-box p{margin-bottom:20px;font-size:15px}
.confirm-box .btns{display:flex;gap:12px;justify-content:center}
.quick-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.item-row{border:1px solid #eee;border-radius:4px;padding:12px;margin-bottom:8px;position:relative;background:#fafbfc}
.item-row .remove-item{position:absolute;top:8px;right:8px;background:none;border:none;color:#f56c6c;cursor:pointer;font-size:16px}
.empty-msg{text-align:center;padding:40px;color:#999;font-size:14px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.status-dot.green{background:#67c23a}
.status-dot.red{background:#f56c6c}
.status-dot.yellow{background:#e6a23c}
.security-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.security-card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px}
.security-card .sec-icon{font-size:28px}
.security-card .sec-info .sec-title{font-size:14px;font-weight:600;margin-bottom:4px}
.security-card .sec-info .sec-status{font-size:12px;color:#67c23a;display:flex;align-items:center;gap:4px}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo">保税仓库<span>管理系统</span></div>
<nav id="sidebarNav"></nav>
</div>
<div class="main" id="mainContent"></div>
<div class="modal-overlay" id="modalOverlay">
<div class="modal"><div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div>
</div>
<div class="confirm-overlay" id="confirmOverlay">
<div class="confirm-box"><p id="confirmMsg"></p><div class="btns"><button class="btn btn-info" onclick="closeConfirm()">取消</button><button class="btn btn-danger" id="confirmOk">确定</button></div></div>
</div>

<script>
const NAV_ITEMS=[
{id:'dashboard',icon:'📊',label:'系统总览'},
{id:'goods',icon:'📦',label:'商品管理'},
{id:'location',icon:'🏭',label:'库位管理'},
{id:'inbound',icon:'📥',label:'入库管理'},
{id:'outbound',icon:'📤',label:'出库管理'},
{id:'sort',icon:'🔄',label:'分拣任务'},
{id:'pack',icon:'📋',label:'包装任务'},
{id:'alert',icon:'⚠️',label:'库存预警'},
{id:'declaration',icon:'🛃',label:'海关申报'},
{id:'document',icon:'📑',label:'三单比对'},
{id:'order',icon:'🛒',label:'订单管理'},
{id:'payment',icon:'💳',label:'支付管理'},
{id:'logistics',icon:'🚚',label:'物流管理'},
{id:'security',icon:'🛡️',label:'安全监控'}
];

let currentPage='dashboard';
let confirmCallback=null;

function init(){
const nav=document.getElementById('sidebarNav');
nav.innerHTML=NAV_ITEMS.map(i=>`<a data-page="${i.id}" class="${i.id==='dashboard'?'active':''}"><span class="icon">${i.icon}</span>${i.label}</a>`).join('');
nav.querySelectorAll('a').forEach(a=>{
a.addEventListener('click',()=>{
nav.querySelectorAll('a').forEach(x=>x.classList.remove('active'));
a.classList.add('active');
switchPage(a.dataset.page);
});
});
buildAllPages();
switchPage('dashboard');
}

function switchPage(page){
currentPage=page;
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
const el=document.getElementById('page-'+page);
if(el)el.classList.add('active');
loadPage(page);
}

async function api(url,opts={}){
try{
const r=await fetch(url,opts);
const j=await r.json();
if(j.code===200)return j.data;
throw new Error(j.message||'请求失败');
}catch(e){alert('操作失败: '+e.message);throw e;}
}

function showModal(title,bodyHtml,footerHtml){
document.getElementById('modalTitle').textContent=title;
document.getElementById('modalBody').innerHTML=bodyHtml;
document.getElementById('modalFooter').innerHTML=footerHtml;
document.getElementById('modalOverlay').classList.add('active');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active')}

function showConfirm(msg,cb){
document.getElementById('confirmMsg').textContent=msg;
confirmCallback=cb;
document.getElementById('confirmOverlay').classList.add('active');
document.getElementById('confirmOk').onclick=()=>{closeConfirm();if(cb)cb();};
}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('active');confirmCallback=null}

function fmtDate(d){return d?new Date(d).toLocaleString('zh-CN'):'-'}
function badge(text,type){return `<span class="badge badge-${type}">${text}</span>`}
function actBtns(btns){return `<div class="actions">${btns.join('')}</div>`}

function buildAllPages(){
const main=document.getElementById('mainContent');
main.innerHTML=NAV_ITEMS.map(i=>`<div class="page" id="page-${i.id}"></div>`).join('');
document.getElementById('page-dashboard').innerHTML=`
<h2>系统总览</h2>
<div class="stat-cards" id="dashStats"></div>
<div class="card"><div class="card-header"><h3>最近预警</h3><button class="btn btn-primary btn-sm" onclick="loadPage('alert')">查看全部</button></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>商品</th><th>类型</th><th>阈值</th><th>状态</th><th>时间</th></tr></thead><tbody id="dashAlerts"></tbody></table></div></div>
<div class="card"><div class="card-header"><h3>快捷操作</h3></div><div class="quick-actions"><button class="btn btn-primary" onclick="navTo('inbound')">📥 新增入库</button><button class="btn btn-success" onclick="navTo('outbound')">📤 新增出库</button><button class="btn btn-warning" onclick="navTo('alert')">⚠️ 检查预警</button><button class="btn btn-info" onclick="navTo('declaration')">🛃 海关申报</button></div></div>`;
document.getElementById('page-goods').innerHTML=`
<h2>商品管理</h2>
<div class="card"><div class="card-header"><h3>商品列表</h3><div><select id="goodsCatFilter" onchange="loadGoods()" style="padding:6px 10px;border:1px solid #dcdfe6;border-radius:4px;font-size:13px"><option value="">全部分类</option></select> <button class="btn btn-primary" onclick="editGoods()">+ 新增商品</button></div></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>SKU</th><th>名称</th><th>分类</th><th>产地</th><th>品牌</th><th>规格</th><th>单位</th><th>HS编码</th><th>单价</th><th>操作</th></tr></thead><tbody id="goodsBody"></tbody></table></div></div>`;
document.getElementById('page-location').innerHTML=`
<h2>库位管理</h2>
<div class="card"><div class="card-header"><h3>库位列表</h3><div><button class="btn btn-primary" onclick="editLocation()">+ 新增库位</button> <button class="btn btn-warning" onclick="assignLocation()">分配库位</button> <button class="btn btn-info" onclick="optimizeLocation()">优化库位</button></div></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>区域</th><th>行</th><th>列</th><th>层</th><th>状态</th><th>商品</th><th>容量</th><th>已用</th></tr></thead><tbody id="locBody"></tbody></table></div></div>`;
document.getElementById('page-inbound').innerHTML=`
<h2>入库管理</h2>
<div class="card"><div class="card-header"><h3>入库单列表</h3><button class="btn btn-primary" onclick="createInbound()">+ 新增入库</button></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>单号</th><th>供应商</th><th>数量</th><th>金额</th><th>状态</th><th>操作员</th><th>时间</th><th>操作</th></tr></thead><tbody id="inboundBody"></tbody></table></div></div>`;
document.getElementById('page-outbound').innerHTML=`
<h2>出库管理</h2>
<div class="card"><div class="card-header"><h3>出库单列表</h3><button class="btn btn-primary" onclick="createOutbound()">+ 新增出库</button></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>单号</th><th>数量</th><th>状态</th><th>操作员</th><th>时间</th><th>操作</th></tr></thead><tbody id="outboundBody"></tbody></table></div></div>`;
document.getElementById('page-sort').innerHTML=`
<h2>分拣任务</h2>
<div class="card"><div class="card-header"><h3>分拣任务列表</h3></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>订单</th><th>商品</th><th>起始位</th><th>目标位</th><th>数量</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="sortBody"></tbody></table></div></div>`;
document.getElementById('page-pack').innerHTML=`
<h2>包装任务</h2>
<div class="card"><div class="card-header"><h3>包装任务列表</h3></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>订单</th><th>商品</th><th>数量</th><th>类型</th><th>重量</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="packBody"></tbody></table></div></div>`;
document.getElementById('page-alert').innerHTML=`
<h2>库存预警</h2>
<div class="card"><div class="card-header"><h3>预警列表</h3><div><button class="btn btn-warning" onclick="checkAlerts()">🔍 检查预警</button> <button class="btn btn-primary" onclick="createAlert()">+ 新增规则</button></div></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>商品</th><th>类型</th><th>阈值</th><th>当前量</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="alertBody"></tbody></table></div></div>`;
document.getElementById('page-declaration').innerHTML=`
<h2>海关申报</h2>
<div class="card"><div class="card-header"><h3>申报列表</h3><div><select id="declStatusFilter" onchange="loadDeclarations()" style="padding:6px 10px;border:1px solid #dcdfe6;border-radius:4px;font-size:13px"><option value="">全部状态</option><option value="待提交">待提交</option><option value="审核中">审核中</option><option value="已通过">已通过</option><option value="已驳回">已驳回</option></select> <button class="btn btn-primary" onclick="createDeclaration()">+ 新增申报</button></div></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>申报号</th><th>订单号</th><th>买方</th><th>卖方</th><th>金额</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="declBody"></tbody></table></div></div>`;
document.getElementById('page-document').innerHTML=`
<h2>三单比对</h2>
<div class="card"><div class="card-header"><h3>三单列表</h3><button class="btn btn-primary" onclick="createDocument()">+ 新增三单</button></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>订单号</th><th>订单单</th><th>支付单</th><th>物流单</th><th>比对状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="docBody"></tbody></table></div></div>`;
document.getElementById('page-order').innerHTML=`
<h2>订单管理</h2>
<div class="stat-cards" id="orderStats"></div>
<div class="card"><div class="card-header"><h3>订单列表</h3><button class="btn btn-primary" onclick="createOrder()">+ 新增订单</button></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>单号</th><th>买方</th><th>金额</th><th>状态</th><th>支付状态</th><th>物流状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="orderBody"></tbody></table></div></div>`;
document.getElementById('page-payment').innerHTML=`
<h2>支付管理</h2>
<div class="card"><div class="card-header"><h3>支付列表</h3><button class="btn btn-primary" onclick="createPayment()">+ 新增支付</button></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>订单</th><th>支付号</th><th>金额</th><th>渠道</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="payBody"></tbody></table></div></div>`;
document.getElementById('page-logistics').innerHTML=`
<h2>物流管理</h2>
<div class="card"><div class="card-header"><h3>物流列表</h3><button class="btn btn-primary" onclick="createLogistics()">+ 新增物流</button></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>订单</th><th>快递号</th><th>快递公司</th><th>收件人</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="logBody"></tbody></table></div></div>`;
document.getElementById('page-security').innerHTML=`
<h2>安全监控</h2>
<div class="security-cards" id="securityCards"></div>`;
}

function navTo(page){
const nav=document.getElementById('sidebarNav');
nav.querySelectorAll('a').forEach(a=>{a.classList.toggle('active',a.dataset.page===page)});
switchPage(page);
}

function loadPage(page){
switch(page){
case 'dashboard':loadDashboard();break;
case 'goods':loadGoods();break;
case 'location':loadLocations();break;
case 'inbound':loadInbound();break;
case 'outbound':loadOutbound();break;
case 'sort':loadSort();break;
case 'pack':loadPack();break;
case 'alert':loadAlerts();break;
case 'declaration':loadDeclarations();break;
case 'document':loadDocuments();break;
case 'order':loadOrders();break;
case 'payment':loadPayments();break;
case 'logistics':loadLogistics();break;
case 'security':renderSecurity();break;
}
}

// Dashboard
async function loadDashboard(){
try{
const d=await api('/api/warehouse/dashboard');
document.getElementById('dashStats').innerHTML=`
<div class="stat-card"><div class="label">商品总数</div><div class="value blue">${d.goodsCount??0}</div></div>
<div class="stat-card"><div class="label">库位总数</div><div class="value blue">${d.locationCount??0}</div></div>
<div class="stat-card"><div class="label">待入库</div><div class="value orange">${d.pendingInbound??0}</div></div>
<div class="stat-card"><div class="label">待出库</div><div class="value orange">${d.pendingOutbound??0}</div></div>
<div class="stat-card"><div class="label">预警数</div><div class="value red">${d.alertCount??0}</div></div>
<div class="stat-card"><div class="label">库位利用率</div><div class="value green">${d.locationUtilization??0}%</div></div>`;
}catch(e){}
try{
const alerts=await api('/api/warehouse/alert/pending');
const tb=document.getElementById('dashAlerts');
if(!alerts||alerts.length===0){tb.innerHTML='<tr><td colspan="6" class="empty-msg">暂无预警</td></tr>';return;}
tb.innerHTML=alerts.slice(0,5).map(a=>`<tr><td>${a.id}</td><td>${a.goodsId||'-'}</td><td>${a.alertType==='库存不足'||a.alertType==='LOW_STOCK'?'库存不足':a.alertType==='缺货'||a.alertType==='OUT_OF_STOCK'?'缺货':a.alertType}</td><td>${a.threshold}</td><td>${badge((a.status==='未处理'||a.status==='PENDING')?'待处理':'已处理',(a.status==='未处理'||a.status==='PENDING')?'orange':'green')}</td><td>${fmtDate(a.createdAt)}</td></tr>`).join('');
}catch(e){}
}

// Goods
async function loadGoods(){
try{
const list=await api('/api/warehouse/goods/list');
const tb=document.getElementById('goodsBody');
if(!list||list.length===0){tb.innerHTML='<tr><td colspan="11" class="empty-msg">暂无数据</td></tr>';return;}
tb.innerHTML=list.map(g=>`<tr><td>${g.id}</td><td>${g.sku||''}</td><td>${g.name||''}</td><td>${g.category||''}</td><td>${g.originCountry||''}</td><td>${g.brand||''}</td><td>${g.specification||''}</td><td>${g.unit||''}</td><td>${g.hsCode||''}</td><td>${g.value||''}</td><td>${actBtns([`<button class="btn btn-primary btn-sm" onclick="editGoods(${g.id})">编辑</button>`,`<button class="btn btn-danger btn-sm" onclick="delGoods(${g.id})">删除</button>`])}</td></tr>`).join('');
const cats=[...new Set(list.map(g=>g.category).filter(Boolean))];
const sel=document.getElementById('goodsCatFilter');
const cv=sel.value;
sel.innerHTML='<option value="">全部分类</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
sel.value=cv;
}catch(e){}
}

function editGoods(id){
if(id){
api('/api/warehouse/goods/'+id).then(g=>{
showGoodsForm(g);
}).catch(()=>{});
}else{showGoodsForm({});}
}

function showGoodsForm(g){
showModal(g.id?'编辑商品':'新增商品',`
<div class="form-row"><div class="form-group"><label>SKU</label><input id="fSku" value="${g.sku||''}"></div><div class="form-group"><label>名称</label><input id="fName" value="${g.name||''}"></div></div>

const tb=document.getElementById('orderBody');
if(!list||list.length===0){tb.innerHTML='<tr><td colspan="9" class="empty-msg">暂无数据</td></tr>';return;}
tb.innerHTML=list.map(o=>{
const sm={PENDING:'待支付',PAID:'已支付',SHIPPED:'已发货',COMPLETED:'已完成',CANCELLED:'已取消','待支付':'待支付','已支付':'已支付','已发货':'已发货','已完成':'已完成','已取消':'已取消'};
const sc={PENDING:'orange',PAID:'blue',SHIPPED:'blue',COMPLETED:'green',CANCELLED:'red','待支付':'orange','已支付':'blue','已发货':'blue','已完成':'green','已取消':'red'};
const psm={UNPAID:'未支付',PAID:'已支付',REFUNDED:'已退款','未支付':'未支付','已支付':'已支付','已退款':'已退款'};
const psc={UNPAID:'red',PAID:'green',REFUNDED:'orange','未支付':'red','已支付':'green','已退款':'orange'};
const lsm={PENDING:'未发货',SHIPPED:'已发货',DELIVERED:'已签收','未发货':'未发货','已发货':'已发货','运输中':'运输中','已签收':'已签收'};
const lsc={PENDING:'gray',SHIPPED:'blue',DELIVEREDED:'green','未发货':'gray','已发货':'blue','运输中':'blue','已签收':'green'};
return `<tr><td>${o.id}</td><td>${o.orderNo||''}</td><td>${o.buyerName||''}</td><td>${o.totalAmount??''}</td><td>${badge(sm[o.status]||o.status,sc[o.status]||'gray')}</td><td>${badge(psm[o.paymentStatus]||o.paymentStatus,psc[o.paymentStatus]||'gray')}</td><td>${badge(lsm[o.logisticsStatus]||o.logisticsStatus,lsc[o.logisticsStatus]||'gray')}</td><td>${fmtDate(o.createdAt)}</td><td>${actBtns([`<button class="btn btn-primary btn-sm" onclick="updateOrderStatus(${o.id})">更新状态</button>`])}</td></tr>`;
}).join('');
}catch(e){}
}

function createOrder(){
showModal('新增订单',`
<div class="form-row"><div class="form-group"><label>买方姓名</label><input id="fOrderBuyer"></div><div class="form-group"><label>买方身份证</label><input id="fOrderBuyerId"></div></div>
<div class="form-row"><div class="form-group"><label>买方电话</label><input id="fOrderBuyerPhone"></div><div class="form-group"><label>总金额</label><input id="fOrderAmount" type="number" step="0.01"></div></div>
<div class="form-group"><label>币种</label><select id="fOrderCurrency"><option value="CNY">CNY</option><option value="USD">USD</option></select></div>
<div class="form-group"><label>订单明细</label><div id="orderItems"></div><button class="btn btn-info btn-sm" onclick="addOrderItem()" style="margin-top:8px">+ 添加明细</button></div>`,
`<button class="btn btn-info" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveOrder()">提交</button>`);
addOrderItem();
}

function addOrderItem(){
const idx=document.querySelectorAll('.order-item').length;
const div=document.createElement('div');
div.className='order-item item-row';
div.innerHTML=`<button class="remove-item" onclick="this.parentElement.remove()">&times;</button>
<div class="form-row"><div class="form-group"><label>商品ID</label><input class="oi-gid" type="number"></div><div class="form-group"><label>商品名称</label><input class="oi-gname"></div></div>
<div class="form-row"><div class="form-group"><label>SKU</label><input class="oi-sku"></div><div class="form-group"><label>数量</label><input class="oi-qty" type="number"></div></div>
<div class="form-group"><label>单价</label><input class="oi-price" type="number" step="0.01">`;
document.getElementById('orderItems').appendChild(div);
}

async function saveOrder(){
const items=[];
document.querySelectorAll('.order-item').forEach(row=>{
items.push({goodsId:parseInt(row.querySelector('.oi-gid').value)||0,goodsName:row.querySelector('.oi-gname').value,sku:row.querySelector('.oi-sku').value,quantity:parseInt(row.querySelector('.oi-qty').value)||0,price:parseFloat(row.querySelector('.oi-price').value)||0});
});
const body={buyerName:document.getElementById('fOrderBuyer').value,buyerIdNo:document.getElementById('fOrderBuyerId').value,buyerPhone:document.getElementById('fOrderBuyerPhone').value,totalAmount:parseFloat(document.getElementById('fOrderAmount').value)||0,currency:document.getElementById('fOrderCurrency').value,items};
await api('/api/order/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
closeModal();loadOrders();
}

function updateOrderStatus(id){
showModal('更新订单状态',`
<div class="form-group"><label>订单状态</label><select id="fOrdStatus"><option value="待支付">待支付</option><option value="已支付">已支付</option><option value="已发货">已发货</option><option value="已完成">已完成</option><option value="已取消">已取消</option></select></div>
<div class="form-group"><label>支付状态</label><select id="fOrdPayStatus"><option value="未支付">未支付</option><option value="已支付">已支付</option><option value="已退款">已退款</option></select></div>
<div class="form-group"><label>物流状态</label><select id="fOrdLogStatus"><option value="未发货">未发货</option><option value="已发货">已发货</option><option value="运输中">运输中</option><option value="已签收">已签收</option></select></div>`,
`<button class="btn btn-info" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doUpdateOrder(${id})">更新</button>`);
}

async function doUpdateOrder(id){
const s=document.getElementById('fOrdStatus').value;
const p=document.getElementById('fOrdPayStatus').value;
const l=document.getElementById('fOrdLogStatus').value;
await api('/api/order/order/'+id+'/status?status='+s,{method:'PUT'});
await api('/api/order/order/'+id+'/payment-status?paymentStatus='+p,{method:'PUT'});
await api('/api/order/order/'+id+'/logistics-status?logisticsStatus='+l,{method:'PUT'});
closeModal();loadOrders();
}

// Payments
async function loadPayments(){
try{
const list=await api('/api/order/payment/list');
const tb=document.getElementById('payBody');
if(!list||list.length===0){tb.innerHTML='<tr><td colspan="8" class="empty-msg">暂无数据</td></tr>';return;}
tb.innerHTML=list.map(p=>{
const sm={PENDING:'待支付',COMPLETED:'已支付',FAILED:'支付失败','待支付':'待支付','已支付':'已支付','支付失败':'支付失败','未支付':'未支付'};
const sc={PENDING:'orange',COMPLETED:'green',FAILED:'red','待支付':'orange','已支付':'green','支付失败':'red','未支付':'red'};
return `<tr><td>${p.id}</td><td>${p.orderId||''}</td><td>${p.paymentNo||''}</td><td>${p.paymentAmount??''}</td><td>${p.paymentChannel||''}</td><td>${badge(sm[p.status]||p.status,sc[p.status]||'gray')}</td><td>${fmtDate(p.createdAt)}</td><td>${(p.status==='PENDING'||p.status==='待支付'||p.status==='未支付')?actBtns([`<button class="btn btn-success btn-sm" onclick="processPayment(${p.orderId})">处理支付</button>`]):'-'}</td></tr>`;
}).join('');
}catch(e){}
}

function createPayment(){
showModal('新增支付',`
<div class="form-row"><div class="form-group"><label>订单ID</label><input id="fPayOrderId" type="number"></div><div class="form-group"><label>订单号</label><input id="fPayOrderNo"></div></div>
<div class="form-row"><div class="form-group"><label>支付金额</label><input id="fPayAmount" type="number" step="0.01"></div><div class="form-group"><label>支付渠道</label><select id="fPayChannel"><option value="ALIPAY">支付宝</option><option value="WECHAT">微信</option><option value="UNION_PAY">银联</option></select></div></div>`,
`<button class="btn btn-info" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="savePayment()">保存</button>`);
}

async function savePayment(){
const body={orderId:parseInt(document.getElementById('fPayOrderId').value),orderNo:document.getElementById('fPayOrderNo').value,paymentAmount:parseFloat(document.getElementById('fPayAmount').value)||0,paymentChannel:document.getElementById('fPayChannel').value};
await api('/api/order/payment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
closeModal();loadPayments();
}

async function processPayment(orderId){showConfirm('确定处理支付？',async()=>{await api('/api/order/payment/process/'+orderId,{method:'POST'});loadPayments();})}

// Logistics
async function loadLogistics(){
try{
const list=await api('/api/order/logistics/list');
const tb=document.getElementById('logBody');
if(!list||list.length===0){tb.innerHTML='<tr><td colspan="8" class="empty-msg">暂无数据</td></tr>';return;}
tb.innerHTML=list.map(l=>{
const sm={PENDING:'待发货',SHIPPED:'已发货',DELIVERED:'已签收','待发货':'待发货','未发货':'未发货','已发货':'已发货','运输中':'运输中','已签收':'已签收'};
const sc={PENDING:'gray',SHIPPED:'blue',DELIVERED:'green','待发货':'gray','未发货':'gray','已发货':'blue','运输中':'blue','已签收':'green'};
return `<tr><td>${l.id}</td><td>${l.orderId||''}</td><td>${l.trackingNo||''}</td><td>${l.logisticsCompany||''}</td><td>${l.receiverName||''}</td><td>${badge(sm[l.status]||l.status,sc[l.status]||'gray')}</td><td>${fmtDate(l.createdAt)}</td><td>${(l.status==='PENDING'||l.status==='待发货'||l.status==='未发货')?actBtns([`<button class="btn btn-success btn-sm" onclick="shipOrder(${l.orderId})">发货</button>`]):'-'}</td></tr>`;
}).join('');
}catch(e){}
}

function createLogistics(){
showModal('新增物流',`
<div class="form-row"><div class="form-group"><label>订单ID</label><input id="fLogOrderId" type="number"></div><div class="form-group"><label>订单号</label><input id="fLogOrderNo"></div></div>
<div class="form-group"><label>快递公司</label><input id="fLogCompany"></div>
<div class="form-row"><div class="form-group"><label>收件人</label><input id="fLogReceiver"></div><div class="form-group"><label>电话</label><input id="fLogPhone"></div></div>

`<button class="btn btn-info" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveLogistics()">保存</button>`);
}

async function saveLogistics(){
const body={orderId:parseInt(document.getElementById('fLogOrderId').value),orderNo:document.getElementById('fLogOrderNo').value,logisticsCompany:document.getElementById('fLogCompany').value,receiverName:document.getElementById('fLogReceiver').value,receiverPhone:document.getElementById('fLogPhone').value,receiverAddress:document.getElementById('fLogAddr').value};
await api('/api/order/logistics',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
closeModal();loadLogistics();
}

async function shipOrder(orderId){showConfirm('确定发货？',async()=>{await api('/api/order/logistics/ship/'+orderId,{method:'POST'});loadLogistics();})}
