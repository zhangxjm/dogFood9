server:
  port: 9001

spring:
  application:
    name: warehouse-service
  datasource:
    url: jdbc:sqlite:data/warehouse.db
    driver-class-name: org.sqlite.JDBC
  cloud:
    nacos:
      discovery:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.bonded.warehouse: INFO
