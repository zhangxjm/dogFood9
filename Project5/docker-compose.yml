version: '3.8'

services:
  fraudguard-app:
    build: .
    container_name: fraudguard-system
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - FRAUDGUARD_STREAM_ENABLED=true
      - FRAUDGUARD_STREAM_THREAD_POOL_SIZE=8
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - fraudguard-network

networks:
  fraudguard-network:
    driver: bridge

volumes:
  fraudguard-data:
