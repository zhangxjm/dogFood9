<div class="layout-container">
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav mode="side" opened class="sidebar" fixedInViewport>
      <div class="sidebar-header">
        <mat-icon class="logo-icon">monitor_heart</mat-icon>
        <span class="logo-text">肺CT智能诊断</span>
      </div>
      <mat-nav-list class="nav-list">
        <a mat-list-item *ngFor="let item of navItems" [routerLink]="item.route"
           routerLinkActive="active-link" (click)="activeRoute = item.route">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="main-content">
      <mat-toolbar class="top-bar" color="primary">
        <span class="toolbar-spacer"></span>
        <div class="user-info" *ngIf="currentUser">
          <mat-icon class="user-avatar">account_circle</mat-icon>
          <span class="user-name">{{ currentUser.name }}</span>
          <span class="user-role">{{ roleLabel }}</span>
          <button mat-icon-button [matMenuTriggerFor]="userMenu">
            <mat-icon>arrow_drop_down</mat-icon>
          </button>
          <mat-menu #userMenu="matMenu">
            <button mat-menu-item (click)="onLogout()">
              <mat-icon>logout</mat-icon>
              <span>退出登录</span>
            </button>
          </mat-menu>
        </div>
      </mat-toolbar>
      <div class="content-area">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
