<div class="page-container">
  <div class="page-header" fxLayout="row" fxLayoutAlign="space-between center">
    <h1 class="page-title">结节检测</h1>
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>恶性等级筛选</mat-label>
      <mat-select [(ngModel)]="malignancyFilter" (selectionChange)="onFilterChange()">
        <mat-option value="">全部</mat-option>
        <mat-option value="benign">良性</mat-option>
        <mat-option value="possibly_benign">可能良性</mat-option>
        <mat-option value="uncertain">不确定</mat-option>
        <mat-option value="possibly_malignant">可能恶性</mat-option>
        <mat-option value="malignant">恶性</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <mat-card class="card">
    <div class="table-container">
      <table mat-table [dataSource]="dataSource">
        <ng-container matColumnDef="studyId">
          <th mat-header-cell *matHeaderCellDef>影像编号</th>
          <td mat-cell *matCellDef="let element">{{ element.studyId }}</td>
        </ng-container>
        <ng-container matColumnDef="noduleType">
          <th mat-header-cell *matHeaderCellDef>结节类型</th>
          <td mat-cell *matCellDef="let element">{{ element.noduleType }}</td>
        </ng-container>
        <ng-container matColumnDef="size">
          <th mat-header-cell *matHeaderCellDef>大小</th>
          <td mat-cell *matCellDef="let element">{{ element.size }}mm</td>
        </ng-container>
        <ng-container matColumnDef="malignancyProbability">
          <th mat-header-cell *matHeaderCellDef>恶性概率</th>
          <td mat-cell *matCellDef="let element">{{ (element.malignancyProbability * 100).toFixed(1) }}%</td>
        </ng-container>
        <ng-container matColumnDef="malignancyLevel">
          <th mat-header-cell *matHeaderCellDef>恶性等级</th>
          <td mat-cell *matCellDef="let element">
            <span class="malignancy-badge" [ngClass]="getMalignancyCssClass(element.malignancyLevel)">
              {{ getMalignancyLabel(element.malignancyLevel) }}
            </span>
          </td>
        </ng-container>
        <ng-container matColumnDef="detectionMethod">
          <th mat-header-cell *matHeaderCellDef>检测方式</th>
          <td mat-cell *matCellDef="let element">{{ getDetectionMethodLabel(element.detectionMethod) }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>操作</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button (click)="viewNodule(element.id)" matTooltip="查看详情">
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>

    <mat-paginator [length]="total" [pageSize]="10" [pageSizeOptions]="[5, 10, 20]"
                   (page)="onPageChange()" showFirstLastButtons></mat-paginator>
  </mat-card>
</div>
