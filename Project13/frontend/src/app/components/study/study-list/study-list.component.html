<div class="page-container">
  <div class="page-header" fxLayout="row" fxLayoutAlign="space-between center">
    <h1 class="page-title">影像中心</h1>
    <button mat-raised-button color="primary" (click)="openUploadDialog()">
      <mat-icon>cloud_upload</mat-icon>
      上传DICOM
    </button>
  </div>

  <mat-card class="card">
    <div class="filter-bar" fxLayout="row" fxLayoutGap="12px" fxLayoutAlign="start center">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>搜索</mat-label>
        <input matInput [(ngModel)]="keyword" (keyup.enter)="onSearch()" placeholder="患者姓名">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
      <mat-form-field appearance="outline" class="status-field">
        <mat-label>状态筛选</mat-label>
        <mat-select [(ngModel)]="statusFilter" (selectionChange)="onSearch()">
          <mat-option value="">全部</mat-option>
          <mat-option value="pending">待分析</mat-option>
          <mat-option value="analyzing">分析中</mat-option>
          <mat-option value="completed">完成</mat-option>
        </mat-select>
      </mat-form-field>
      <button mat-raised-button color="primary" (click)="onSearch()">搜索</button>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource">
        <ng-container matColumnDef="patientName">
          <th mat-header-cell *matHeaderCellDef>患者姓名</th>
          <td mat-cell *matCellDef="let element">{{ element.patientName }}</td>
        </ng-container>
        <ng-container matColumnDef="studyDate">
          <th mat-header-cell *matHeaderCellDef>检查日期</th>
          <td mat-cell *matCellDef="let element">{{ element.studyDate | date:'yyyy-MM-dd' }}</td>
        </ng-container>
        <ng-container matColumnDef="studyType">
          <th mat-header-cell *matHeaderCellDef>检查类型</th>
          <td mat-cell *matCellDef="let element">{{ element.studyType }}</td>
        </ng-container>
        <ng-container matColumnDef="bodyPart">
          <th mat-header-cell *matHeaderCellDef>检查部位</th>
          <td mat-cell *matCellDef="let element">{{ element.bodyPart }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>状态</th>
          <td mat-cell *matCellDef="let element">
            <span class="status-badge" [ngClass]="getStatusClass(element.status)">
              {{ getStatusLabel(element.status) }}
            </span>
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>操作</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button (click)="viewStudy(element.id)" matTooltip="查看">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button color="primary" (click)="analyzeStudy(element.id)"
                    matTooltip="AI分析" *ngIf="element.status === 'pending'">
              <mat-icon>auto_fix_high</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>

    <mat-paginator [length]="total" [pageSize]="10" [pageSizeOptions]="[5, 10, 20]"
                   (page)="onPageChange()" showFirstLastButtons></mat-paginator>
  </mat-card>
</div>
