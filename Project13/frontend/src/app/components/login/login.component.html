<div class="login-container" fxLayout="row" fxLayoutAlign="center center">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title class="login-title">
        <mat-icon class="login-icon">monitor_heart</mat-icon>
        肺部CT智能诊断系统
      </mat-card-title>
      <mat-card-subtitle>医生工作站</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>用户名</mat-label>
          <input matInput formControlName="username" placeholder="请输入用户名">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">请输入用户名</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>密码</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="请输入密码">
          <mat-icon matSuffix (click)="hidePassword = !hidePassword" class="toggle-password">
            {{ hidePassword ? 'visibility_off' : 'visibility' }}
          </mat-icon>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">请输入密码</mat-error>
        </mat-form-field>

        <div class="error-msg" *ngIf="errorMsg">
          <mat-icon>error</mat-icon>
          {{ errorMsg }}
        </div>

        <button mat-raised-button color="primary" type="submit" class="login-btn" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
          <span *ngIf="!loading">登 录</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
