<div class="page-container">
  <div class="page-header" fxLayout="row" fxLayoutAlign="space-between center">
    <h1 class="page-title">专家会诊</h1>
    <div fxLayout="row" fxLayoutGap="8px">
      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>状态筛选</mat-label>
        <mat-select [(ngModel)]="statusFilter" (selectionChange)="onFilterChange()">
          <mat-option value="">全部</mat-option>
          <mat-option value="pending">待会诊</mat-option>
          <mat-option value="in_progress">会诊中</mat-option>
          <mat-option value="completed">已完成</mat-option>
        </mat-select>
      </mat-form-field>
      <button mat-raised-button color="primary" (click)="createConsultation()">
        <mat-icon>add</mat-icon>
        新建会诊
      </button>
    </div>
  </div>

  <mat-card class="card">
    <div class="table-container">
      <table mat-table [dataSource]="dataSource">
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>标题</th>
          <td mat-cell *matCellDef="let element">{{ element.title }}</td>
        </ng-container>
        <ng-container matColumnDef="initiatorName">
          <th mat-header-cell *matHeaderCellDef>发起人</th>
          <td mat-cell *matCellDef="let element">{{ element.initiatorName }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>状态</th>
          <td mat-cell *matCellDef="let element">
            <span class="status-badge" [ngClass]="getStatusClass(element.status)">
              {{ getStatusLabel(element.status) }}
            </span>
          </td>
        </ng-container>
        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef>创建时间</th>
          <td mat-cell *matCellDef="let element">{{ element.createdAt | date:'yyyy-MM-dd HH:mm' }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>操作</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button (click)="viewConsultation(element.id)" matTooltip="查看详情">
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>

    <mat-paginator [length]="total" [pageSize]="10" [pageSizeOptions]="[5, 10, 20]"
                   (page)="onPageChange()" showFirstLastButtons></mat-paginator>
  </mat-card>
</div>
