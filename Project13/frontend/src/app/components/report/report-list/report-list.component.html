<div class="page-container">
  <div class="page-header" fxLayout="row" fxLayoutAlign="space-between center">
    <h1 class="page-title">诊断报告</h1>
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>状态筛选</mat-label>
      <mat-select [(ngModel)]="statusFilter" (selectionChange)="onFilterChange()">
        <mat-option value="">全部</mat-option>
        <mat-option value="unsigned">未签署</mat-option>
        <mat-option value="signed">已签署</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <mat-card class="card">
    <div class="table-container">
      <table mat-table [dataSource]="dataSource">
        <ng-container matColumnDef="patientName">
          <th mat-header-cell *matHeaderCellDef>患者姓名</th>
          <td mat-cell *matCellDef="let element">{{ element.patientName }}</td>
        </ng-container>
        <ng-container matColumnDef="reportType">
          <th mat-header-cell *matHeaderCellDef>报告类型</th>
          <td mat-cell *matCellDef="let element">{{ element.reportType }}</td>
        </ng-container>
        <ng-container matColumnDef="conclusion">
          <th mat-header-cell *matHeaderCellDef>结论</th>
          <td mat-cell *matCellDef="let element" class="conclusion-cell">{{ element.conclusion }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>状态</th>
          <td mat-cell *matCellDef="let element">
            <span class="status-badge" [ngClass]="element.status === 'unsigned' ? 'status-unsigned' : 'status-signed'">
              {{ getStatusLabel(element.status) }}
            </span>
          </td>
        </ng-container>
        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef>创建时间</th>
          <td mat-cell *matCellDef="let element">{{ element.createdAt | date:'yyyy-MM-dd HH:mm' }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>操作</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button (click)="viewReport(element.id)" matTooltip="查看详情">
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>

    <mat-paginator [length]="total" [pageSize]="10" [pageSizeOptions]="[5, 10, 20]"
                   (page)="onPageChange()" showFirstLastButtons></mat-paginator>
  </mat-card>
</div>
