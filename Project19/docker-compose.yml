version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-home-backend
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=development
    volumes:
      - ./backend:/app
    networks:
      - smart-home-network
    depends_on:
      - asr-service
      - nlu-service

  asr-service:
    build:
      context: ./docker
      dockerfile: asr.Dockerfile
    container_name: smart-home-asr
    ports:
      - "8001:8001"
    networks:
      - smart-home-network

  nlu-service:
    build:
      context: ./docker
      dockerfile: nlu.Dockerfile
    container_name: smart-home-nlu
    ports:
      - "8002:8002"
    networks:
      - smart-home-network

networks:
  smart-home-network:
    driver: bridge
