<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="消防数字孪生救援指挥系统">
  <meta name="keywords" content="消防,数字孪生,救援,指挥系统">
  <title>消防数字孪生救援指挥系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>🚒 消防指挥</h2>
      <p>数字孪生救援平台</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard">
        <span class="nav-icon">📊</span>态势总览
      </div>
      <div class="nav-item" data-page="building3d">
        <span class="nav-icon">🏢</span>3D建筑
      </div>
      <div class="nav-item" data-page="firemap">
        <span class="nav-icon">🔥</span>火场态势
      </div>
      <div class="nav-item" data-page="personnel">
        <span class="nav-icon">👥</span>被困人员
      </div>
      <div class="nav-item" data-page="rescue">
        <span class="nav-icon">🎯</span>救援方案
      </div>
      <div class="nav-item" data-page="command">
        <span class="nav-icon">📡</span>救援指令
      </div>
      <div class="nav-item" data-page="resource">
        <span class="nav-icon">📦</span>应急资源
      </div>
      <div class="nav-item" data-page="monitor">
        <span class="nav-icon">📈</span>系统监控
      </div>
    </nav>
  </aside>
  <div class="main-wrapper">
    <header class="header-bar">
      <h1>消防数字孪生救援指挥系统</h1>
      <span class="system-time" id="system-time"></span>
    </header>
    <main class="main-content">
      <div class="tab-content active" id="page-dashboard"></div>
      <div class="tab-content" id="page-building3d"></div>
      <div class="tab-content" id="page-firemap"></div>
      <div class="tab-content" id="page-personnel"></div>
      <div class="tab-content" id="page-rescue"></div>
      <div class="tab-content" id="page-command"></div>
      <div class="tab-content" id="page-resource"></div>
      <div class="tab-content" id="page-monitor"></div>
    </main>
  </div>
  <div class="modal" id="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">标题</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
  <div class="toast-container" id="toast-container"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
