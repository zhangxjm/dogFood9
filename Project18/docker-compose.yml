services:
  backend:
    build:
      context: ./backend
    container_name: delivery-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/app/data
    networks:
      - delivery-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: delivery-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - delivery-network
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

networks:
  delivery-network:
    driver: bridge
